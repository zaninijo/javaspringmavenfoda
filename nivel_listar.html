<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Níveis</title>

    <!-- Bootstrap CSS -->
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">

        <h1 class="text-center mb-4">Lista de Níveis</h1>

        <div class="text-end mb-3">
            <a href="/nivel/cadastrar" class="btn btn-success">+ Novo Nível</a>
        </div>

        <table class="table table-bordered table-striped">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Número do Nível</th>
                    <th>Nome do Nível</th>
                    <th>Pontos Necessários</th>
                    <th>Benefício</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="n : ${niveis}">
                    <td th:text="${n.id}"></td>
                    <td th:text="${n.numero_nivel}"></td>
                    <td th:text="${n.nome_nivel}"></td>
                    <td th:text="${n.pontos_necessarios}"></td>
                    <td th:text="${n.beneficio}"></td>
                </tr>
            </tbody>
        </table>

    </div>

</div>

</body>
</html>
