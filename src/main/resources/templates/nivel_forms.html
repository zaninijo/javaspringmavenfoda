<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Novo Nível</title>

    <!-- Bootstrap CSS -->
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow p-4">

        <h1 class="text-center mb-4">Cadastrar Nível</h1>

        <form action="/nivel/salvar" method="post">

            <div class="mb-3">
                <label class="form-label">ID</label>
                <input type="number" name="id" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Número do Nível</label>
                <input type="text" name="numero_nivel" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Nome do Nível</label>
                <input type="text" name="nome_nivel" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Pontos Necessários</label>
                <input type="text" name="pontos_necessarios" class="form-control">
            </div>

            <div class="mb-3">
                <label class="form-label">Benefício</label>
                <input type="text" name="beneficio" class="form-control">
            </div>

            <div class="text-center">
                <button type="submit" class="btn btn-primary w-100">
                    Salvar
                </button>
            </div>

        </form>

    </div>

</div>

</body>
</html>
