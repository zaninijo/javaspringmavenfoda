<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Página Inicial</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5em;
        }
        
        p {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        a {
            display: inline-block;
            padding: 12px 30px;
            margin: 10px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s ease;
            font-weight: bold;
        }
        
        a:hover {
            background: #764ba2;
        }
        
        .info {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 5px;
            margin-top: 30px;
            text-align: left;
        }
        
        .info h3 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .info ul {
            list-style-position: inside;
            color: #666;
            line-height: 2;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 th:text="${message}">Bem-vindo!</h1>
        
        <p>Você está utilizando um projeto Spring Boot com:</p>
        
        <div class="info">
            <h3>🛠️ Tecnologias Incluídas:</h3>
            <ul>
                <li>✅ Spring Boot 3.3.0</li>
                <li>✅ Java 17</li>
                <li>✅ Spring Web (REST APIs)</li>
                <li>✅ Spring Data JPA</li>
                <li>✅ Thymeleaf (Template Engine)</li>
                <li>✅ SQLite Database</li>
                <li>✅ Hibernate ORM</li>
            </ul>
        </div>
        
        <div class="button-group">
            <a href="/about">ℹ️ Sobre</a>
            <a href="/api/users">👥 Usuários (API)</a>
            <a href="https://github.com/zaninijo/javaspringmavenfoda" target="_blank">🔗 GitHub</a>
        </div>
    </div>
</body>
</html>
